<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compact Pro Impact Section</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+Grantha&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #ffffff;
      --card-bg: #ffffff;
      --text-main: #0b1528;
      --accent: #2563eb;
      --border: #e2e8f0;
      --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); padding: 80px 20px; }

    .premium-wrapper { max-width: 900px; margin: 0 auto; }

    .impact-header { text-align: center; margin-bottom: 50px; }
    .impact-header h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--text-main); }

    /* Compact Grid */
    .impact-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* 2 columns on small screens */
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .impact-card {
      background: var(--card-bg);
      padding: 30px 20px; /* Reduced padding for compact look */
      text-align: center;
      transition: var(--transition);
      cursor: pointer;
    }

    .impact-card:hover {
      background: #f8fafc;
      transform: translateY(-3px);
      z-index: 10;
    }

    .stat-number {
      font-family: 'Noto Sans Grantha', sans-serif;
      font-size: 2.5rem; /* Reduced font size for smaller boxes */
      font-weight: 400;
      color: var(--text-main);
      margin-bottom: 5px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .stat-suffix {
      font-family: 'Inter', sans-serif;
      color: var(--accent);
      font-size: 1.2rem;
      font-weight: 700;
      margin-top: 2px;
    }

    .stat-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 800;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    /* Desktop: Expand to 4 columns */
    @media (min-width: 768px) {
      .impact-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .impact-card::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 30%;
      right: 30%;
      height: 2px;
      background: var(--accent);
      opacity: 0;
      transition: var(--transition);
    }
    .impact-card:hover::after { opacity: 1; left: 0; right: 0; }
  </style>
</head>
<body>

  <section class="premium-wrapper">
    <div class="impact-header">
      <h2>Scaling impact across the nation.</h2>
    </div>
    
    <div class="impact-grid">
      <div class="impact-card">
        <div class="stat-number">1000<span class="stat-suffix">+</span></div>
        <p class="stat-label">Chargers</p>
      </div>
      <div class="impact-card">
        <div class="stat-number">300<span class="stat-suffix">+</span></div>
        <p class="stat-label">Staff</p>
      </div>
      <div class="impact-card">
        <div class="stat-number">50<span class="stat-suffix">+</span></div>
        <p class="stat-label">Cities</p>
      </div>
      <div class="impact-card">
        <div class="stat-number">24<span class="stat-suffix">×</span>7</div>
        <p class="stat-label">Support</p>
      </div>
    </div>
  </section>

</body>
</html>
