<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Team Directory — Serif Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ----------------------------------------------------
           1. CORE ARCHITECTURE & SYSTEM DESIGN
        ---------------------------------------------------- */
        :root {
            --bg-canvas: #ffffff;
            --bg-card: #f4f4f5;
            --text-heading: #030712;
            --text-body: #6b7280;
            --text-accent: #111827;
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --transition-fluid: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-heading);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        /* ----------------------------------------------------
           2. SERIF HEADER LAYOUT
        ---------------------------------------------------- */
        .team-container {
            max-width: 840px; /* Tighter container for compact structure */
            width: 100%;
        }

        .section-header {
            margin-bottom: 45px;
            text-align: left;
            max-width: 600px;
        }

        .section-title {
            font-family: var(--font-serif); /* Exact style matching your image */
            font-size: 2.4rem;
            font-weight: 650;
            letter-spacing: -0.01em;
            color: var(--text-heading);
            margin-bottom: 12px;
        }

        .section-subtitle {
            font-size: 0.9rem;
            color: var(--text-body);
            line-height: 1.5;
            font-weight: 400;
        }

        /* ----------------------------------------------------
           3. EXPERT ULTRA-COMPACT GRID & BOXES
        ---------------------------------------------------- */
        .team-grid {
            display: grid;
            /* Shrunk down to 150px minmax for beautifully small image blocks */
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 24px 16px; 
        }

        .team-card {
            position: relative;
            background-color: var(--bg-card);
            border-radius: 6px;
            overflow: hidden;
            aspect-ratio: 1 / 1.15;
            cursor: pointer;
            will-change: transform;
            transform: translateZ(0);
            transition: border-radius 0.6s var(--transition-fluid);
        }

        .team-card:hover {
            border-radius: 14px;
        }

        .member-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.15);
            transition: transform 0.8s var(--transition-fluid), filter 0.8s var(--transition-fluid);
        }

        /* Light Minimal Matte Reveal Layer */
        .team-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.98) 0%, rgba(255, 255, 255, 0.88) 55%, transparent 100%);
            opacity: 0;
            transition: opacity 0.6s var(--transition-fluid);
            z-index: 1;
        }

        .team-card:hover::after {
            opacity: 1;
        }

        .team-card:hover .member-img {
            transform: scale(1.03);
            filter: grayscale(0);
        }

        /* ----------------------------------------------------
           4. CONDENSED TEXT INTERFACE (ON HOVER)
        ---------------------------------------------------- */
        .member-details {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 14px 12px; /* Fine-tuned for small boxes */
            z-index: 2;
            text-align: left;
            
            /* Hidden Defaults */
            opacity: 0;
            transform: translateY(10px);
            transition: transform 0.6s var(--transition-fluid), opacity 0.5s var(--transition-fluid);
        }

        .team-card:hover .member-details {
            opacity: 1;
            transform: translateY(0);
        }

        .member-name {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text-heading);
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .member-role {
            font-size: 0.72rem;
            color: var(--text-body);
            font-weight: 400;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Micro Social System */
        .member-socials {
            display: flex;
            gap: 10px;
        }

        .member-socials a {
            color: var(--text-body);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s ease, transform 0.2s ease;
            display: inline-block;
        }

        .member-socials a:hover {
            color: var(--text-accent);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <section class="team-container">
        <header class="section-header">
            <h2 class="section-title">Our Team's</h2>
            <p class="section-subtitle">A collective of focused minds running at the intersection of design, technology, and operational performance.</p>
        </header>
        
        <div class="team-grid" id="teamGrid"></div>
    </section>

    <script>
        const teamData = [
            { name: "Lisa Thompson", role: "Customer Success Manager", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500&auto=format&fit=crop&q=80" },
            { name: "Laura Davis", role: "COO", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=500&auto=format&fit=crop&q=80" },
            { name: "Tom White", role: "Head of Product", img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=500&auto=format&fit=crop&q=80" },
            { name: "James Wilson", role: "CTO", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500&auto=format&fit=crop&q=80" },
            { name: "Sarah Williams", role: "Director of Sales", img: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=500&auto=format&fit=crop&q=80" },
            { name: "David Miller", role: "Lead Software Engineer", img: "https://images.unsplash.com/photo-1522075469751-3a6694fb2f61?w=500&auto=format&fit=crop&q=80" },
            { name: "Emily Johnson", role: "Marketing Specialist", img: "https://images.unsplash.com/photo-1580489944761-15a19d654956?w=500&auto=format&fit=crop&q=80" },
            { name: "Jillie Bernard", role: "Founder & CEO", img: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=500&auto=format&fit=crop&q=80" }
        ];

        const gridDOMElement = document.getElementById('teamGrid');

        const renderTeamUI = () => {
            const fragment = document.createDocumentFragment();

            teamData.forEach(member => {
                const card = document.createElement('div');
                card.classList.add('team-card');

                card.innerHTML = `
                    <img src="${member.img}" alt="Portrait of ${member.name}" class="member-img" loading="lazy">
                    <div class="member-details">
                        <h3 class="member-name">${member.name}</h3>
                        <p class="member-role">${member.role}</p>
                        <div class="member-socials">
                            <a href="#" aria-label="LinkedIn profile"><i class="fab fa-linkedin-in"></i></a>
                            <a href="mailto:example@domain.com" aria-label="Send Email"><i class="fas fa-envelope"></i></a>
                            <a href="#" aria-label="Twitter profile"><i class="fab fa-twitter"></i></a>
                        </div>
                    </div>
                `;
                fragment.appendChild(card);
            });

            gridDOMElement.appendChild(fragment);
        };

        document.addEventListener('DOMContentLoaded', renderTeamUI);
    </script>
</body>
</html>
