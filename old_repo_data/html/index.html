<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGP | The Intelligence of Premium Charging</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
    
    <!-- GSAP Animation Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root {
            --brand-blue: #2575c0;
            --blue-light: #b3d9ff; 
            --blue-mid: #5dade2;
            --blue-deep: #2e86c1;
            --glass-bg: rgba(10, 12, 16, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.55);
            --font-sans: 'Outfit', sans-serif;
            --font-serif: 'Playfair Display', serif;
            --ease-pro: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased; 
        }

        @media (min-width: 1101px) {
            * { cursor: none !important; }
        }

        body { 
            background: #030506; 
            color: var(--text-main);
            font-family: var(--font-sans);
            overflow-x: hidden;
            width: 100%;
        }

        /* --- Premium GSAP Track Cursor Styles --- */
        #cursor-dot {
            position: fixed;
            width: 8px; height: 8px;
            background: white;
            border-radius: 50%;
            z-index: 10000;
            pointer-events: none;
            mix-blend-mode: difference;
            display: none;
        }
        #cursor-ring {
            position: fixed;
            width: 40px; height: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
            transition: background 0.3s, border 0.3s;
            display: none;
        }
        @media (min-width: 1101px) {
            #cursor-dot, #cursor-ring { display: block; }
        }

        /* --- Classic IGP Navbar --- */
        .navbar {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            white-space: nowrap;
            width: 92%;
            max-width: 1200px;
            transition: filter 0.4s var(--ease-pro), all 0.4s var(--ease-pro);
        }

        .brand-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-right: 16px;
        }

        .logo-pill {
            background: #FFFFFF;
            padding: 4px 20px;
            border-radius: 50px;
            margin-bottom: 2px;
        }
        .logo-pill span { color: #1a5dab; font-weight: 800; font-size: 1.1rem; letter-spacing: -0.8px; }
        .tagline { font-size: 8px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; opacity: 0.5; }

        .nav-menu { display: flex; position: relative; gap: 4px; align-items: center; }
        .nav-link {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: 100px;
            transition: color 0.4s var(--ease-pro);
        }
        .nav-link.active, .nav-link:hover { color: #FFFFFF; }

        .nav-indicator {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            height: 42px;
            z-index: -1;
            display: none;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cta-nav {
            background: var(--brand-blue);
            color: #FFF;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        .cta-nav:hover { background: var(--blue-deep); }

        /* Mobile Hamburger Trigger */
        .menu-toggle {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 20px;
            padding: 8px;
        }

        /* --- SECTION 1: Hero Content Area --- */
        .hero-section {
            min-height: 100vh;
            background: radial-gradient(circle at center, rgba(3,5,6,0.2) 0%, #030506 100%), url('bg.png') no-repeat center center / cover;
            display: flex;
            align-items: center;
            padding: 120px 6% 80px 6%;
            position: relative;
            width: 100%;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(3, 5, 6, 0.9) 0%, rgba(3, 5, 6, 0.5) 70%, rgba(3, 5, 6, 0.2) 100%);
        }

        @media (min-width: 992px) {
            .hero-section { padding: 0 10%; }
            .hero-section::before {
                background: radial-gradient(circle at 15% 50%, rgba(3, 5, 6, 0.98) 0%, rgba(3, 5, 6, 0.4) 65%, rgba(3, 5, 6, 0) 100%);
            }
        }

        .content-box { 
            position: relative; 
            z-index: 10; 
            max-width: 900px; 
            width: 100%;
            margin-top: 40px;
            transition: filter 0.4s var(--ease-pro);
        }

        .prefix-large {
            display: block;
            font-size: clamp(1.6rem, 4.5vw, 3.8rem); 
            font-weight: 200; 
            letter-spacing: -1px;
            color: rgba(255,255,255,0.95);
            margin-bottom: 5px;
            line-height: 1.1;
        }

        h1 {
            font-size: clamp(2.8rem, 7.5vw, 5.8rem);
            font-weight: 400;
            line-height: 0.95;
            letter-spacing: -2px;
            margin-bottom: 24px;
        }

        .italic-gradient {
            font-family: var(--font-serif);
            font-style: italic;
            display: block;
            padding-bottom: 0.1em; 
            background: linear-gradient(to right, #ffffff 10%, var(--blue-light) 40%, var(--blue-deep) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        p {
            font-size: clamp(1rem, 1.2vw, 1.15rem);
            color: var(--text-dim);
            line-height: 1.7;
            max-width: 520px;
            margin-bottom: 36px;
            font-weight: 300;
        }

        .hero-btns { 
            display: flex; 
            flex-direction: column;
            gap: 16px; 
            align-items: stretch; 
        }

        @media (min-width: 576px) {
            .hero-btns { flex-direction: row; align-items: center; }
        }
        
        .btn-premium {
            text-decoration: none;
            padding: 18px 38px;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.2s, background 0.3s, border-color 0.3s;
        }

        .btn-live { background: #FFFFFF; color: #030506; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .btn-live:hover { background: #e0e0e0; }
        .btn-outline { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .btn-outline:hover { background: rgba(255,255,255,0.08); border-color: rgba(255, 255, 255, 0.3); }

        /* --- SECTION 2: Responsive Laptop Showcase Area --- */
        .showcase-section {
            position: relative;
            background-color: #ffffff;
            min-height: auto; /* Changed from 70vh to auto to collapse extra height */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 24px 10px 24px; /* Reduced bottom padding from 80px to 10px to pull marquee UP */
            overflow: hidden;
            width: 100%;
        }

        .black-oval-background {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 120px; 
            background: linear-gradient(to bottom, #030506 30%, #091a30 100%); 
            border-bottom-left-radius: 50% 40px;
            border-bottom-right-radius: 50% 40px;
            z-index: 1;
            transition: filter 0.4s var(--ease-pro);
            box-shadow: inset 0 -20px 30px rgba(37, 117, 192, 0.15);
        }

        @media (min-width: 992px) {
            .black-oval-background {
                height: 160px;
                border-bottom-left-radius: 50% 80px;
                border-bottom-right-radius: 50% 80px;
                width: 110%;
            }
        }

        .laptop-wrapper {
            position: relative;
            z-index: 10;
            width: 100%; 
            max-width: 950px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: filter 0.4s var(--ease-pro);
        }

        .laptop-img {
            width: 100%;
            height: auto;
            display: block;
            position: relative;
            z-index: 3;
        }

        .laptop-shadow {
            position: absolute;
            bottom: -25px; 
            left: 50%;
            transform: translateX(-50%);
            width: 98%;
            height: 450px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.25) 0%, rgba(0, 0, 0, 0.08) 50%, rgba(0, 0, 0, 0) 75%);
            border-radius: 50%;
            filter: blur(16px); 
            z-index: 2;
            pointer-events: none;
        }

        .video-bar {
            position: absolute;
            top: 43%; 
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #e62121;
            color: #ffffff;
            width: clamp(50px, 8vw, 76px);
            height: clamp(50px, 8vw, 76px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 0 0 rgba(230, 33, 33, 0.6), 0 8px 25px rgba(0,0,0,0.25);
            animation: pulse-animation 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 4;
        }

        .video-bar i {
            font-size: clamp(16px, 2.5vw, 24px);
            margin-left: 4px;
        }

        .video-bar:hover {
            background-color: #cc1111;
            transform: translate(-50%, -50%) scale(1.08);
            box-shadow: 0 0 0 18px rgba(230, 33, 33, 0), 0 12px 30px rgba(0,0,0,0.35);
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(230, 33, 33, 0.6), 0 8px 25px rgba(0,0,0,0.25); }
            70% { box-shadow: 0 0 0 16px rgba(230, 33, 33, 0), 0 8px 25px rgba(0,0,0,0.15); }
            100% { box-shadow: 0 0 0 0 rgba(230, 33, 33, 0), 0 8px 25px rgba(0,0,0,0.25); }
        }

        /* --- SECTION 3: Integrated Marquee Partners Section --- */
        .partners-section-fixed {
            background: radial-gradient(120% 120% at 50% 0%, #fbfcfd 0%, #ffffff 100%);
            padding: 10px 0 65px 0; /* Reduced top padding from 45px to 10px to minimize the gap */
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .partners-container-fixed {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .partners-title-fixed {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-family: var(--font-serif); /* Changed from 'Outfit' to 'Playfair Display' */
    font-size: clamp(1.8rem, 4vw, 2.3rem); /* Make it scalable and prominent */
    font-weight: 560; /* Heavy weight to match the reference image */
    letter-spacing: -0.5px; /* Serifs look better with tighter tracking */
    color: #0f172a;
    text-align: center;
    margin-bottom: 38px;
    line-height: 1.2;
}

        .partners-title-fixed::before,
        .partners-title-fixed::after {
            content: '';
            width: 90px;
            height: 1px;
            background: linear-gradient(
                to right,
                transparent,
                rgba(15, 23, 42, 0.18),
                transparent
            );
        }

        .marquee-wrapper-fixed {
            display: flex;
            overflow: hidden;
            width: 100%;
            position: relative;
            user-select: none;
            padding: 15px 0;
            mask-image: linear-gradient(
                to right,
                transparent,
                #000 15%,
                #000 85%,
                transparent
            );
            -webkit-mask-image: linear-gradient(
                to right,
                transparent,
                #000 15%,
                #000 85%,
                transparent
            );
        }

        .marquee-track-fixed {
            display: flex;
            align-items: center;
            gap: 40px;
            padding-right: 40px;
            flex-shrink: 0;
            animation: marquee-scroll-fixed 25s linear infinite;
        }

        .marquee-wrapper-fixed:hover .marquee-track-fixed {
            animation-play-state: paused;
        }

        .partner-fixed-card {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 110px;
            height: 50px;
            border-radius: 10px;
            background: transparent;
            border: 1px solid transparent;
            transition: all 0.35s ease;
        }

        .partner-fixed-card:hover {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.05);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .partner-fixed-logo {
            width: 100%;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            filter: grayscale(100%) opacity(0.55);
            transition: all 0.3s ease;
        }

        .partner-fixed-card:hover .partner-fixed-logo {
            filter: grayscale(0%) opacity(1);
        }

        .partner-fixed-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes marquee-scroll-fixed {
            from { transform: translateX(0); }
            to { transform: translateX(-100%); }
        }

        /* --- BLUR INTERFACES EFFECT COUPLING --- */
        body.modal-open .content-box,
        body.modal-open .navbar,
        body.modal-open .black-oval-background,
        body.modal-open .laptop-wrapper,
        body.modal-open .partners-section-fixed {
            filter: blur(10px);
        }

        /* --- POPUP MODAL ARCHITECTURE --- */
        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.4); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 16px;
        }

        .video-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            position: relative;
            width: 900px;
            max-width: 100%;
            aspect-ratio: 16/9;
            background: #000000;
            border-radius: 12px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.6);
            transform: scale(0.92);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .video-modal.active .modal-content {
            transform: scale(1);
        }

        .modal-content video {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 11px;
            display: block;
            background-color: #000000;
        }

        .close-btn {
            position: absolute;
            top: -50px;
            right: 0;
            background: rgba(15, 15, 15, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1010;
        }

        @media (min-width: 768px) {
            .close-btn {
                top: 15px;
                right: 15px;
            }
        }

        .close-btn:hover {
            background: #ff3333;
            border-color: #ff3333;
            transform: rotate(90deg) scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 51, 51, 0.4);
        }

        /* --- Full Dynamic Breakpoints --- */
        @media (max-width: 1100px) {
            .brand-stack { border-right: none; }
            .navbar { top: 16px; padding: 8px 14px; }
            
            .menu-toggle { display: block; }
            
            .nav-menu {
                position: fixed;
                top: 85px;
                left: 50%;
                transform: translateX(-50%) scale(0.95);
                width: 92%;
                background: rgba(15, 18, 24, 0.96);
                border: 1px solid var(--glass-border);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                border-radius: 24px;
                padding: 24px;
                flex-direction: column;
                gap: 8px;
                opacity: 0;
                pointer-events: none;
                transition: transform 0.4s var(--ease-pro), opacity 0.4s var(--ease-pro);
                box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            }

            .nav-menu.mobile-active {
                opacity: 1;
                pointer-events: auto;
                transform: translateX(-50%) scale(1);
            }

            .nav-link { width: 100%; text-align: center; padding: 14px; }
            
            .hero-section { text-align: center; justify-content: center; }
            .content-box { display: flex; flex-direction: column; align-items: center; }
            p { margin-left: auto; margin-right: auto; }
        }

        @media (min-width: 1101px) {
            .brand-stack { border-right: 1px solid rgba(255, 255, 255, 0.12); margin-right: 8px; }
            .nav-indicator { display: block; }
        }

        /* Mobile Marquee Tweaks */
        @media (max-width: 768px) {
            .partners-section-fixed { padding: 10px 0 50px 0; }
            .partners-title-fixed { font-size: 13px; gap: 12px; margin-bottom: 28px; }
            .partners-title-fixed::before, .partners-title-fixed::after { width: 40px; }
            .partner-fixed-card { width: 75px; height: 35px; }
            .partner-fixed-logo { height: 14px; }
            .marquee-track-fixed { gap: 28px; padding-right: 28px; animation-duration: 18s; }
        }
    </style>
</head>
<body>

    <!-- Dynamic Tracking Elements -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- Universal Navigation Frame -->
    <nav class="navbar" id="main-nav">
        <div class="brand-stack">
            <div class="logo-pill"><span>IGP</span></div>
            <span class="tagline">By Sparklehood</span>
        </div>

        <div class="nav-menu" id="nav-container">
            <div class="nav-indicator" id="indicator"></div>
            <a class="nav-link active">Home</a>
            <a class="nav-link">Fleet</a>
            <a class="nav-link">Technology</a>
            <a class="nav-link">Network</a>
            <a class="nav-link">Connect</a>
        </div>

        <div class="nav-right">
            <a href="#" class="cta-nav">Get Started</a>
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- SECTION 1: Full-Screen Hero Visual Stage -->
    <main class="hero-section">
        <section class="content-box">
            <h1>
                <span class="prefix-large">The Intelligence of</span>
                <span class="italic-gradient">Premium Charging.</span>
            </h1>
            <p>Deploying world-class EV infrastructure where architectural elegance meets industrial-grade performance.</p>
            
            <div class="hero-btns">
                <a href="#" class="btn-premium btn-live magnetic" data-strength="25" id="heroLiveDemoBtn">
                    <span>See Live Demo</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </a>
                <a href="#" class="btn-premium btn-outline magnetic" data-strength="15">View Brochure</a>
            </div>
        </section>
    </main>

    <!-- SECTION 2: Black Geometric Transition Layer & Laptop Dashboard -->
    <section class="showcase-section">
        <div class="black-oval-background"></div>
        
        <div class="laptop-wrapper">
            <img src="laptop.png" alt="Laptop Dashboard Visual Asset" class="laptop-img">
            <div class="laptop-shadow"></div>
            <div class="video-bar" id="openVideoBtn">
                <i class="fa-solid fa-play"></i>
            </div>
        </div>
    </section>

    <!-- SECTION 3: Infinite Logo Marquee -->
    <section class="partners-section-fixed">
        <div class="partners-container-fixed">
            <h2 class="partners-title-fixed">
                Powering the World's Leading Brands
            </h2>

            <div class="marquee-wrapper-fixed">
                <!-- Track 1 -->
                <div class="marquee-track-fixed">
                    <div class="partner-fixed-card">
                        <div class="partner-fixed-logo">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon">
                        </div>
                    </div>
                    <div class="partner-fixed-card">
                        <div class="partner-fixed-logo">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Honda_Logo.svg" alt="Honda">
                        </div>
                    </div>
                    <div class="partner-fixed-card">
                        <div class="partner-fixed-logo">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Flipkart_logo.svg" alt="Flipkart">
                        </div>
                    </div>
                    <div class="partner-fixed-card">
                        <div class="partner-fixed-logo">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/KPMG_logo.svg" alt="KPMG">
                        </div>
                    </div>
                    <div class="partner-fixed-card">
                        <div class="partner-fixed-logo">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Paytm_Logo_%28standalone%29.svg" alt="Paytm">
                        </div>
                    </div>
                </div>

                <!-- Track 2 (Infinite Mirror) -->
                <div class="marquee-track-fixed" aria-hidden="true">
                    <div class="partner-fixed-card">
                        <div class="partner-fixed-logo">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon">
                        </div>
                    </div>
                    <div class="partner-fixed-card">
                        <div class="partner-fixed-logo">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Honda_Logo.svg" alt="Honda">
                        </div>
                    </div>
                    <div class="partner-fixed-card">
                        <div class="partner-fixed-logo">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Flipkart_logo.svg" alt="Flipkart">
                        </div>
                    </div>
                    <div class="partner-fixed-card">
                        <div class="partner-fixed-logo">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/KPMG_logo.svg" alt="KPMG">
                        </div>
                    </div>
                    <div class="partner-fixed-card">
                        <div class="partner-fixed-logo">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Paytm_Logo_%28standalone%29.svg" alt="Paytm">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Video Player Popup Matrix Overlay Framework -->
    <div class="video-modal" id="videoModal">
        <div class="modal-content">
            <button class="close-btn" id="closeVideoBtn" aria-label="Terminate display view">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <video id="videoPlayer" controls playsinline preload="auto">
                <source src="ev.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <script>
        // --- Premium Custom Mouse Tracking (Desktop Only) ---
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');

        if (window.innerWidth > 1100) {
            window.addEventListener('mousemove', (e) => {
                gsap.to(dot, { x: e.clientX, y: e.clientY, duration: 0.1 });
                gsap.to(ring, { x: e.clientX - 20, y: e.clientY - 20, duration: 0.2 });
            });

            const hoverables = document.querySelectorAll('a, button, .brand-stack, .video-bar, .close-btn');
            hoverables.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    gsap.to(ring, { scale: 1.4, background: 'rgba(255,255,255,0.05)', border: '1px solid #fff', duration: 0.3 });
                });
                el.addEventListener('mouseleave', () => {
                    gsap.to(ring, { scale: 1, background: 'transparent', border: '1px solid rgba(255,255,255,0.3)', duration: 0.3 });
                });
            });
        }

        // --- Mobile Menu Toggle logic ---
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('nav-container');
        const toggleIcon = menuToggle.querySelector('i');

        menuToggle.addEventListener('click', () => {
            navMenu.classList.toggle('mobile-active');
            if(navMenu.classList.contains('mobile-active')) {
                toggleIcon.classList.remove('fa-bars');
                toggleIcon.classList.add('fa-xmark');
                gsap.fromTo(".nav-link", {opacity: 0, y: 10}, {opacity: 1, y: 0, stagger: 0.05, duration: 0.4, ease: "power2.out"});
            } else {
                toggleIcon.classList.remove('fa-xmark');
                toggleIcon.classList.add('fa-bars');
            }
        });

        // Close menu on link click
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('mobile-active');
                toggleIcon.classList.remove('fa-xmark');
                toggleIcon.classList.add('fa-bars');
            });
        });

        // --- Premium Magnetic Inertial Interaction (Desktop Only) ---
        if (window.innerWidth > 576) {
            const magnets = document.querySelectorAll('.magnetic');
            magnets.forEach((el) => {
                el.addEventListener('mousemove', (e) => {
                    const rect = el.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    const str = el.getAttribute('data-strength');
                    gsap.to(el, { x: x * (str / 100), y: y * (str / 100), duration: 0.6, ease: "power2.out" });
                });
                el.addEventListener('mouseleave', () => {
                    gsap.to(el, { x: 0, y: 0, duration: 1, ease: "elastic.out(1, 0.3)" });
                });
            });
        }

        // --- Slide Tracker Navbar Indicator Interaction ---
        const indicator = document.getElementById('indicator');
        const links = document.querySelectorAll('.nav-link');
        const container = document.getElementById('nav-container');

        const moveIndicator = (target) => {
            if(window.innerWidth > 1100) {
                const rect = target.getBoundingClientRect();
                const parentRect = container.getBoundingClientRect();
                gsap.to(indicator, { x: rect.left - parentRect.left, width: rect.width, duration: 0.5, ease: "expo.out" });
            }
        };

        links.forEach(link => {
            link.addEventListener('mouseenter', () => moveIndicator(link));
            if(link.classList.contains('active')) {
                window.addEventListener('load', () => setTimeout(() => moveIndicator(link), 100));
            }
        });

        // --- Interactive Media System Engines ---
        const openBtn = document.getElementById('openVideoBtn');
        const heroDemoBtn = document.getElementById('heroLiveDemoBtn');
        const closeBtn = document.getElementById('closeVideoBtn');
        const modal = document.getElementById('videoModal');
        const videoPlayer = document.getElementById('videoPlayer');
        const body = document.body;

        const openModalMatrix = (e) => {
            if(e) e.preventDefault();
            modal.classList.add('active');
            body.classList.add('modal-open'); 
            
            videoPlayer.currentTime = 0; 
            setTimeout(() => {
                const playPromise = videoPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        console.log("Local video stream started cleanly.");
                    }).catch(error => {
                        videoPlayer.muted = true;
                        videoPlayer.play();
                    });
                }
            }, 50);
        };

        const closeModalMatrix = () => {
            modal.classList.remove('active');
            body.classList.remove('modal-open');
            videoPlayer.pause();       
            videoPlayer.currentTime = 0; 
        };

        openBtn.addEventListener('click', openModalMatrix);
        heroDemoBtn.addEventListener('click', openModalMatrix);
        closeBtn.addEventListener('click', closeModalMatrix);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModalMatrix(); });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) closeModalMatrix();
        });

        // --- Structural Entrance Intro Sequencer ---
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();
            tl.from(".navbar", { y: -60, opacity: 0, duration: 1.2, ease: "power4.out" })
              .from(".prefix-large", { opacity: 0, y: 20, duration: 0.8, ease: "power3.out" }, "-=0.6")
              .from(".italic-gradient", { y: 40, opacity: 0, duration: 1, ease: "expo.out" }, "-=0.6")
              .from("p", { y: 20, opacity: 0, duration: 0.8 }, "-=0.8")
              .from(".hero-btns", { y: 15, opacity: 0, duration: 0.8 }, "-=0.6");
        });
    </script>
</body>
</html>
